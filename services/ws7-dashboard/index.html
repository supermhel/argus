<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SIEM — Console</title>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --border:#30363d; --txt:#e6edf3; --muted:#8b949e;
    --crit:#f85149; --high:#db8e1a; --med:#d29922; --low:#3fb950; --accent:#388bfd;
  }
  *{box-sizing:border-box}
  body{margin:0;font:14px/1.5 -apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--txt)}
  header{display:flex;align-items:center;gap:16px;padding:12px 20px;border-bottom:1px solid var(--border);background:var(--panel)}
  header h1{font-size:16px;margin:0;font-weight:600}
  nav{display:flex;gap:4px;margin-left:auto}
  nav button{background:transparent;color:var(--muted);border:1px solid transparent;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px}
  nav button.active{color:var(--txt);background:var(--bg);border-color:var(--border)}
  main{padding:20px;max-width:1200px;margin:0 auto}
  .view{display:none}.view.active{display:block}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:16px}
  .card .n{font-size:28px;font-weight:700}.card .l{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.04em}
  table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--border);border-radius:8px;overflow:hidden}
  th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px}
  th{color:var(--muted);font-weight:600;text-transform:uppercase;font-size:11px;letter-spacing:.04em}
  tr:last-child td{border-bottom:none} tr.clk{cursor:pointer} tr.clk:hover{background:#1c2330}
  .pill{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600}
  .crit{background:rgba(248,81,73,.15);color:var(--crit)} .high{background:rgba(219,142,26,.15);color:var(--high)}
  .med{background:rgba(210,153,34,.15);color:var(--med)} .low{background:rgba(63,185,80,.15);color:var(--low)}
  .toolbar{display:flex;gap:8px;margin-bottom:12px}
  input,select{background:var(--bg);border:1px solid var(--border);color:var(--txt);padding:7px 10px;border-radius:6px;font-size:13px}
  .triage-status{max-width:130px} .triage-note{max-width:180px}
  .detail{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:18px;margin-top:14px}
  .detail h3{margin:0 0 10px} .kv{display:grid;grid-template-columns:140px 1fr;gap:4px 12px;font-size:13px}
  .kv .k{color:var(--muted)} .bar{height:18px;background:var(--bg);border:1px solid var(--border);border-radius:4px;overflow:hidden}
  .bar>span{display:block;height:100%;background:var(--accent)} .src{display:flex;align-items:center;gap:10px;margin:8px 0}
  .src .lbl{width:90px;color:var(--muted)} .muted{color:var(--muted)} a{color:var(--accent);cursor:pointer}
  /* M3: session login */
  #loginScreen{display:flex;align-items:center;justify-content:center;min-height:80vh}
  #loginBox{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:28px;width:280px}
  #loginBox h2{margin:0 0 16px;font-size:15px}
  #loginBox label{display:block;font-size:12px;color:var(--muted);margin:12px 0 4px}
  #loginBox input{width:100%}
  #loginBox button{width:100%;margin-top:18px;background:var(--accent);color:#fff;border:none;padding:9px;border-radius:6px;cursor:pointer;font-size:13px}
  #loginError{color:var(--crit);font-size:12px;margin-top:10px;min-height:14px}
  #userBadge{color:var(--muted);font-size:12px;display:flex;align-items:center;gap:8px}
  #logoutBtn{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:12px}
  #appRoot{display:none}
</style>
</head>
<body>
<header>
  <h1>🛡️ SIEM Console</h1>
  <span class="muted" id="apiStatus">mock data</span>
  <nav>
    <button data-view="global" class="active">Overview</button>
    <button data-view="inventory">Inventory</button>
    <button data-view="sources">Sources</button>
  </nav>
  <!-- M3: only populated/shown once a real RBAC session is confirmed (checkSession());
       stays empty and invisible when RBAC is off, matching every other opt-in auth
       layer's "unset = zero behavior change" convention in this project. -->
  <span id="userBadge" style="display:none;margin-left:12px"></span>
</header>

<!-- M3: session-login gate. RBAC is opt-in (services/shared/users.py::FENGARDE_RBAC_DB) --
     when the backend has no RBAC DB configured, GET /auth/me 404s (route doesn't exist)
     and checkSession() below reveals #appRoot immediately, exactly the pre-M3 behavior.
     Only a real 401 (RBAC on, no/expired session) ever shows this form. -->
<div id="loginScreen" hidden>
  <div id="loginBox">
    <h2>Sign in</h2>
    <form id="loginForm">
      <label for="loginUser">Username</label>
      <input id="loginUser" name="username" autocomplete="username" required />
      <label for="loginPass">Password</label>
      <input id="loginPass" name="password" type="password" autocomplete="current-password" required />
      <button type="submit">Sign in</button>
      <div id="loginError"></div>
    </form>
  </div>
</div>

<div id="appRoot">
<main>
  <!-- LEVEL 1 -->
  <section id="global" class="view active">
    <div class="cards" id="globalCards"></div>
    <h3>Active critical alerts</h3>
    <table><thead><tr><th>Time</th><th>Rule</th><th>Sector</th><th>Level</th><th>Score</th><th>Source</th><th>Triage</th><th>Note</th><th>Report</th></tr></thead>
      <tbody id="alertRows"></tbody></table>
  </section>

  <!-- v0.4 Track R: incident-report draft panel, hidden until a report is requested -->
  <div id="reportPanel" class="detail" hidden>
    <button id="reportClose" style="float:right">Close</button>
    <h3>Incident report (draft)</h3>
    <pre id="reportBody" style="white-space:pre-wrap;font-family:inherit"></pre>
  </div>

  <!-- LEVEL 2 -->
  <section id="inventory" class="view">
    <div class="toolbar">
      <input id="q" placeholder="Filter by IP or MAC…" />
      <select id="sector"><option value="">All sectors</option><option>bank</option><option>datacenter</option><option>common</option></select>
    </div>
    <table><thead><tr><th>MAC</th><th>Hostname</th><th>Current IP</th><th>Sector</th><th>Type</th><th>Status</th></tr></thead>
      <tbody id="assetRows"></tbody></table>
    <div id="assetDetail"></div>
  </section>

  <!-- LEVEL 3 -->
  <section id="sources" class="view">
    <h3>Events by protocol / source</h3>
    <div id="srcBars"></div>
  </section>
</main>
</div><!-- /#appRoot -->

<script src="mocks/mock_data.js"></script>
<script>
// ---- data access: live API if configured, else mock --------------------
const INVENTORY_API = window.INVENTORY_API || null; // e.g. "http://localhost:8000"
// DX4: alerts are LIVE by default, fetched same-origin from the nginx reverse
// proxy (/api/alerts -> OpenSearch alerts-*/_search). Override with
// window.ALERTS_API = null to force mock-only.
const ALERTS_API = (window.ALERTS_API !== undefined) ? window.ALERTS_API : "/api/alerts";
let LIVE = false; // true once live alerts are successfully loaded

// ---- M3: RBAC session login (opt-in backend feature, see services/shared/rbac.py) ----
// Same-origin proxy to ws3-indexer's /auth/* routes (services/ws7-dashboard/templates/
// default.conf.template). Override with window.AUTH_API = null to force the pre-M3
// ungated behavior (useful for the mock-only dev harness).
const AUTH_API = (window.AUTH_API !== undefined) ? window.AUTH_API : "/api/auth";
let SESSION = null;      // {username, role, tenant_id} once logged in, else null
let CSRF_TOKEN = null;   // echoed back as X-CSRF-Token on every write once logged in

// True if the caller should proceed to render the app (RBAC off, or a real
// session already exists); false if the login form is now showing instead.
async function checkSession(){
  if(!AUTH_API){ revealApp(); return true; }
  try{
    const r = await fetch(`${AUTH_API}/me`, {credentials:"same-origin"});
    if(r.status === 404){
      // No RBAC backend at all (FENGARDE_RBAC_DB unset) -- the pre-M3 default,
      // zero behavior change, same convention as every other opt-in auth layer.
      revealApp();
      return true;
    }
    if(r.ok){
      const body = await r.json();
      SESSION = {username: body.username, role: body.role, tenant_id: body.tenant_id};
      CSRF_TOKEN = body.csrf_token || null;
      showLoggedIn();
      return true;
    }
  }catch(e){
    // Proxy/backend unreachable: fail toward showing the app rather than
    // locking a legitimate RBAC-off deployment out over a transient network
    // blip -- same "never crash, degrade visibly" discipline as getAlerts().
    revealApp();
    return true;
  }
  showLoginForm();
  return false;
}

// .style.display, never the `hidden` attribute and never "" to "unset": both
// #loginScreen and #appRoot have their own CSS rules (ID selectors), which
// outrank the UA stylesheet's `[hidden]{display:none}` in specificity, and
// clearing an inline style with "" falls back to THOSE rules, not to
// visible -- so both traps silently no-op. Always set an explicit value.
function revealApp(){
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("appRoot").style.display = "block";
}

function showLoginForm(){
  document.getElementById("loginScreen").style.display = "flex";
  document.getElementById("appRoot").style.display = "none";
  document.getElementById("loginUser").focus();
}

function showLoggedIn(){
  revealApp();
  const badge = document.getElementById("userBadge");
  if(SESSION){
    badge.style.display = "";
    badge.innerHTML = `${esc(SESSION.username)} <span class="pill low">${esc(SESSION.role)}</span> `
      + `<button id="logoutBtn">Sign out</button>`;
    document.getElementById("logoutBtn").onclick = doLogout;
  }
}

async function doLogin(username, password){
  const errEl = document.getElementById("loginError");
  errEl.textContent = "";
  try{
    const r = await fetch(`${AUTH_API}/login`, {
      method: "POST", credentials: "same-origin",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({username, password})
    });
    const body = await r.json();
    if(!r.ok){
      errEl.textContent = body.error || "sign-in failed";
      return;
    }
    SESSION = {username: body.username, role: body.role, tenant_id: body.tenant_id};
    CSRF_TOKEN = body.csrf_token || null;
    showLoggedIn();
    boot();
  }catch(e){
    errEl.textContent = "sign-in service unreachable";
  }
}

async function doLogout(){
  try{
    await fetch(`${AUTH_API}/logout`, {
      method: "POST", credentials: "same-origin",
      headers: CSRF_TOKEN ? {"X-CSRF-Token": CSRF_TOKEN} : {}
    });
  }catch(e){ /* fall through -- clear local state regardless */ }
  SESSION = null; CSRF_TOKEN = null;
  showLoginForm();
}

document.addEventListener("DOMContentLoaded", () => {
  const form = document.getElementById("loginForm");
  if(form) form.addEventListener("submit", (e) => {
    e.preventDefault();
    doLogin(document.getElementById("loginUser").value, document.getElementById("loginPass").value);
  });
});

async function getAssets(){
  if(INVENTORY_API){ try{ return await (await fetch(INVENTORY_API+"/assets?limit=200")).json(); }catch(e){} }
  return window.SIEM_MOCK.assets;
}

// Fetch REAL alerts from OpenSearch (via same-origin proxy). Maps _search hits to
// the dashboard's alert shape and filters out ai.results docs (they lack a
// rule_title/score). Falls back to mock data if the proxy is unreachable.
async function getAlerts(){
  if(ALERTS_API){
    try{
      const r = await fetch(ALERTS_API, {headers:{Accept:"application/json"}});
      if(r.ok){
        const data = await r.json();
        const hits = (((data||{}).hits||{}).hits)||[];
        const alerts = hits.map(h=>h._source)
          // keep only real rule alerts; drop ai.results (no rule_title/score).
          .filter(s=>s && s.rule_title)
          .map(s=>({
            alert_id: s.alert_id,
            time: s.time,
            rule_title: s.rule_title,
            level: s.level,
            score: s.score,
            sector: s.sector,
            src_endpoint: s.src_endpoint||{},
            actor: s.actor||{}
          }));
        LIVE = true;
        return alerts;
      }
    }catch(e){ /* fall through to mock */ }
  }
  LIVE = false;
  return window.SIEM_MOCK.alerts;
}
function getSources(){ return window.SIEM_MOCK.sources; }
const lvl = s => ({critical:"crit",high:"high",medium:"med",low:"low"}[s]||"low");
// SECURITY: alert/asset fields (hostname, IP, rule_title, etc.) originate from
// attacker-controlled log lines. They are rendered into innerHTML below, so every
// dynamic value MUST be HTML-escaped or a crafted log yields stored DOM XSS in the
// analyst's browser (e.g. a syslog hostname of `<img/src=x/onerror=...>`).
const esc = s => String(s==null?"":s).replace(/[&<>"']/g,
  c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

// ---- nav ----
document.querySelectorAll("nav button").forEach(b=>b.onclick=()=>{
  document.querySelectorAll("nav button").forEach(x=>x.classList.remove("active"));
  document.querySelectorAll(".view").forEach(x=>x.classList.remove("active"));
  b.classList.add("active"); document.getElementById(b.dataset.view).classList.add("active");
});

// ---- LEVEL 1: global ----
// C1 (v0.3): the triage state API. Same-origin path, proxied by nginx to
// ws3-indexer's triage_api.py (services/ws3-indexer/triage_api.py), mirroring
// the existing /api/alerts proxy pattern. Override with window.TRIAGE_API =
// null to disable (falls back to read-only rendering, no crash).
const TRIAGE_API = (window.TRIAGE_API !== undefined) ? window.TRIAGE_API : "/api/triage";
const TRIAGE_STATUSES = ["new", "triaged", "closed", "false_positive", "true_positive"];

async function fetchTriage(alertId){
  if(!TRIAGE_API) return {status:"new", note:""};
  try{
    const r = await fetch(`${TRIAGE_API}/alerts/${encodeURIComponent(alertId)}/triage`);
    if(r.ok) return await r.json();
  }catch(e){ /* fall through to default */ }
  return {status:"new", note:""};
}

// M3: a real RBAC session (see checkSession()) must echo its csrf_token back
// on every write or the backend rejects it 403 (services/ws3-indexer/
// triage_api.py::_check_csrf) -- a no-op {} when RBAC is off / not logged in,
// same "unset = zero behavior change" convention as every auth layer here.
function csrfHeaders(){
  return CSRF_TOKEN ? {"X-CSRF-Token": CSRF_TOKEN} : {};
}

async function updateTriage(alertId, status, note){
  if(!TRIAGE_API) return null;
  try{
    const r = await fetch(`${TRIAGE_API}/alerts/${encodeURIComponent(alertId)}/triage`, {
      method:"POST", credentials:"same-origin",
      headers:{"Content-Type":"application/json", ...csrfHeaders()},
      body: JSON.stringify({status, note})
    });
    if(r.ok) return await r.json();
  }catch(e){ /* network/proxy down -- UI keeps its optimistic local value */ }
  return null;
}

function triageStatusOptions(selected){
  return TRIAGE_STATUSES.map(s =>
    `<option value="${esc(s)}"${s===selected?" selected":""}>${esc(s)}</option>`).join("");
}

// bug fix (v0.3): this was `const alerts = getAlerts();` with no await --
// getAlerts() is `async`, so `alerts` was a Promise, and every .filter/.sort/
// .map below would throw (a Promise has none of those methods). The static
// contract test never executes JS so this never surfaced -- confirmed broken
// by reading the code, not by a report. renderGlobal is now itself async.
async function renderGlobal(){
  const assets = window.SIEM_MOCK.assets, alerts = await getAlerts();
  const statusEl = document.getElementById("apiStatus");
  if(statusEl) statusEl.textContent = LIVE ? "live data" : "mock data";
  const active = assets.filter(a=>a.status==="active").length;
  const crit = alerts.filter(a=>a.level==="critical").length;
  document.getElementById("globalCards").innerHTML = [
    ["Active devices", active],["Inactive devices", assets.length-active],
    ["Critical alerts", crit],["Total alerts", alerts.length]
  ].map(([l,n])=>`<div class="card"><div class="n">${n}</div><div class="l">${l}</div></div>`).join("");

  const sorted = alerts.sort((a,b)=>b.score-a.score);
  const triageByAlert = {};
  await Promise.all(sorted.map(async a => {
    if(a.alert_id) triageByAlert[a.alert_id] = await fetchTriage(a.alert_id);
  }));

  document.getElementById("alertRows").innerHTML = sorted.map(a=>{
    const t = triageByAlert[a.alert_id] || {status:"new", note:""};
    const aid = esc(a.alert_id||"");
    return `
    <tr><td class="muted">${esc(new Date(a.time).toLocaleTimeString())}</td>
    <td>${esc(a.rule_title)}</td><td>${esc(a.sector||"")}</td>
    <td><span class="pill ${lvl(a.level)}">${esc(a.level)}</span></td>
    <td>${esc(a.score)}</td><td class="muted">${esc((a.src_endpoint||{}).ip||"")}</td>
    <td><select class="triage-status" data-alert-id="${aid}">${triageStatusOptions(t.status)}</select></td>
    <td><input class="triage-note" data-alert-id="${aid}" type="text" placeholder="analyst note"
        value="${esc(t.note||"")}" /></td>
    <td><button class="report-btn" data-alert-id="${aid}">Report</button>
    <button class="nis2-btn" data-alert-id="${aid}" title="Draft NIS2 notification (German, Art. 23 NIS2 / §32 BSIG) -- see docs/nis2-report-generator.md">NIS2 (DE)</button></td></tr>`;
  }).join("");

  // wire triage controls: status change + note blur both POST the update.
  document.querySelectorAll("#alertRows .triage-status").forEach(sel => {
    sel.onchange = async () => {
      const noteEl = document.querySelector(
        `#alertRows .triage-note[data-alert-id="${CSS.escape(sel.dataset.alertId)}"]`);
      await updateTriage(sel.dataset.alertId, sel.value, noteEl ? noteEl.value : "");
    };
  });
  document.querySelectorAll("#alertRows .triage-note").forEach(inp => {
    inp.onblur = async () => {
      const selEl = document.querySelector(
        `#alertRows .triage-status[data-alert-id="${CSS.escape(inp.dataset.alertId)}"]`);
      await updateTriage(inp.dataset.alertId, selEl ? selEl.value : "new", inp.value);
    };
  });

  // v0.4 Track R: "Report" button -> POST to generate (or re-generate) a
  // draft incident report, then render it. Same fail-open discipline as
  // triage: a proxy/backend failure shows an inline error, never a crash.
  async function generateReport(alertId, query){
    const panel = document.getElementById("reportPanel");
    const body = document.getElementById("reportBody");
    body.textContent = "Generating report…";
    panel.hidden = false;
    try{
      const r = await fetch(`${TRIAGE_API}/alerts/${encodeURIComponent(alertId)}/report${query||""}`,
        {method:"POST", credentials:"same-origin", headers: csrfHeaders()});
      if(r.ok){
        const report = await r.json();
        // body is markdown, rendered as PLAIN TEXT (never innerHTML) --
        // contracts/reporting.md hard rule #4: the backend is external
        // input (a paid backend, or -- for the NIS2 mode -- deterministic
        // but still just text), stored-XSS discipline applies identically.
        body.textContent = report.body || "(empty report)";
      }else{
        body.textContent = `Error: report unavailable (HTTP ${r.status}).`;
      }
    }catch(e){
      body.textContent = "Error: report service unreachable.";
    }
  }
  document.querySelectorAll("#alertRows .report-btn").forEach(btn => {
    btn.onclick = () => generateReport(btn.dataset.alertId, "");
  });
  // M5: "NIS2 (DE)" button -> the SAME report endpoint, additive query
  // params select the deterministic NIS2/§32 BSIG German template instead
  // of the generic one (nis2_template.py). DRAFT -- not legal advice; see
  // docs/nis2-report-generator.md for the NIS2-vs-DORA scope caveat this
  // draft itself also states inline.
  document.querySelectorAll("#alertRows .nis2-btn").forEach(btn => {
    btn.onclick = () => generateReport(btn.dataset.alertId, "?template=nis2&stage=notification&lang=de");
  });
}

document.addEventListener("DOMContentLoaded", () => {
  const closeBtn = document.getElementById("reportClose");
  if(closeBtn) closeBtn.onclick = () => { document.getElementById("reportPanel").hidden = true; };
});

// ---- LEVEL 2: inventory ----
let ALL=[];
async function renderInventory(){
  ALL = await getAssets(); drawAssets(ALL);
}
function drawAssets(list){
  document.getElementById("assetRows").innerHTML = list.map((a,i)=>`
    <tr class="clk" data-i="${i}"><td>${esc(a.mac)}</td><td>${esc(a.hostname||"")}</td>
    <td>${esc(a.ip_current||"")}</td><td>${esc(a.sector||"")}</td><td>${esc(a.type||"")}</td>
    <td><span class="pill ${a.status==='active'?'low':'med'}">${esc(a.status)}</span></td></tr>`).join("");
  document.querySelectorAll("#assetRows tr").forEach(tr=>tr.onclick=()=>showAsset(list[+tr.dataset.i]));
}
function showAsset(a){
  const hist = (a.ip_history||[]).map(h=>`<tr><td>${esc(h.ip)}</td><td class="muted">${esc(h.from)}</td><td class="muted">${esc(h.to||"current")}</td></tr>`).join("")||"<tr><td colspan=3 class=muted>—</td></tr>";
  document.getElementById("assetDetail").innerHTML = `<div class="detail">
    <h3>${esc(a.hostname||a.mac)} <span class="muted">(${esc(a.mac)})</span></h3>
    <div class="kv"><div class="k">Current IP</div><div>${esc(a.ip_current||"—")}</div>
    <div class="k">Sector</div><div>${esc(a.sector||"—")}</div>
    <div class="k">Type</div><div>${esc(a.type||"—")}</div>
    <div class="k">Protocols</div><div>${esc((a.protocols_seen||[]).join(", ")||"—")}</div>
    <div class="k">Last seen</div><div>${esc(a.last_seen||"—")}</div></div>
    <h3 style="margin-top:16px">IP history</h3>
    <table><thead><tr><th>IP</th><th>From</th><th>To</th></tr></thead><tbody>${hist}</tbody></table></div>`;
}
function applyFilter(){
  const q=document.getElementById("q").value.trim().toLowerCase();
  const sec=document.getElementById("sector").value;
  drawAssets(ALL.filter(a=>
    (!sec||a.sector===sec) &&
    (!q || (a.ip_current||"").toLowerCase().includes(q) || a.mac.toLowerCase().includes(q))));
}
document.getElementById("q").oninput=applyFilter;
document.getElementById("sector").onchange=applyFilter;

// ---- LEVEL 3: sources ----
function renderSources(){
  const s=getSources(), max=Math.max(...Object.values(s));
  document.getElementById("srcBars").innerHTML = Object.entries(s).map(([k,v])=>`
    <div class="src"><div class="lbl">${esc(k)}</div>
    <div class="bar" style="flex:1"><span style="width:${(v/max*100).toFixed(1)}%"></span></div>
    <div style="width:60px;text-align:right">${v.toLocaleString()}</div></div>`).join("");
}

// M3: gate the app's first render behind the session check -- RBAC off (or
// already logged in) resolves true immediately and this is byte-for-byte the
// pre-M3 bootstrap; RBAC on with no session shows the login form instead and
// boot() is deferred until doLogin() succeeds.
async function boot(){
  const ok = await checkSession();
  if(!ok) return;
  renderGlobal().catch(err=>console.error("renderGlobal failed:",err));
  renderInventory();
  renderSources();
}
boot();
</script>
</body>
</html>
