name: CodeQL

# M2 supply-chain trust signal (PLAN_C Tier 2.2). Static analysis for
# security vulnerabilities across the Python codebase.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "42 4 * * 1"  # weekly, Monday 04:42 UTC

# Least-privilege default (Scorecard TokenPermissionsID); the analyze job
# re-grants itself security-events: write below, which is all it needs.
permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: github/codeql-action/init@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81  # v3
        with:
          languages: python
          queries: security-extended
      - uses: github/codeql-action/analyze@b7351df727350dca84cb9d725d57dcf5bc82ba26  # v3
        with:
          category: "/language:python"
