name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege default for every job (Scorecard TokenPermissionsID):
# nothing in this workflow writes to the repo or its APIs.
permissions:
  contents: read

jobs:
  # Secret-scanning gate: fail the build if any credential/secret is committed.
  # Uses the official gitleaks action. Public OSS repo => no GITLEAKS_LICENSE needed.
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          # Full history so gitleaks can scan all commits, not just the tip.
          fetch-depth: 0
      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2
        env:
          # Lets the action post a summary / comment on pull requests.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Zero-infra gate: contract tests + runner/window/evaluator + both e2e on the memory bus.
  contract-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install pyyaml hypothesis
      - name: Full zero-infra gate
        run: PYTHON=python3 bash run_all_tests.sh

  # Integration gate: the Redis-path mechanisms (runner ack/redelivery/DLQ) against a
  # REAL broker. This is the tier that catches anything the memory bus can't model.
  redis-integration:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install pyyaml redis
      - name: Runner ack + XAUTOCLAIM redelivery + DLQ on real Redis
        env:
          BUS_BACKEND: redis
          REDIS_URL: redis://localhost:6379/0
        run: python services/shared/test_runner.py
      - name: P0-5 acked-stream reaper (trim_acked) on real Redis
        env:
          BUS_BACKEND: redis
          REDIS_URL: redis://localhost:6379/0
        run: python services/shared/test_bus_trim_acked.py
      - name: P1-7 real consumer backlog signal (lag) on real Redis
        env:
          BUS_BACKEND: redis
          REDIS_URL: redis://localhost:6379/0
        run: python services/shared/test_bus_lag.py
      - name: P1-8 XREADGROUP batch size on real Redis
        env:
          BUS_BACKEND: redis
          REDIS_URL: redis://localhost:6379/0
        run: python services/shared/test_bus_read_count.py

  # M2 code-quality floor (PLAN_C Tier 2.3). Lint blocks; coverage blocks at the
  # MEASURED baseline (see tools/coverage_gate.py) not the unmet-for-WS-3 85%
  # target -- see that file's docstring for why. mypy is BLOCKING as of
  # 2026-07-22 (0 findings across all 8 workstreams): see pyproject.toml's
  # [tool.mypy] comment.
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.11"
      - name: Install deps
        # hypothesis: the coverage gate runs parsers/test_property_hardening.py
        # (tools/coverage_gate.py line ~33), which imports it -- without it the
        # gate dies on ModuleNotFoundError before measuring anything.
        run: pip install ruff mypy coverage pyyaml types-PyYAML hypothesis
      - name: ruff (blocking)
        run: ruff check services/ tools/
      - name: mypy (blocking -- see pyproject.toml)
        run: |
          for ws in services/ws1-collectors services/ws2-normalization services/ws3-indexer \
                    services/ws4-detection services/ws5-ai services/ws6-inventory services/shared tools; do
            mypy "$ws" --explicit-package-bases --ignore-missing-imports
          done
      - name: coverage gate (WS-2/WS-3 core, blocking at measured baseline)
        run: python tools/coverage_gate.py
      - name: mutmut (informational, non-blocking -- see pyproject.toml [tool.mutmut])
        run: |
          pip install mutmut
          python -m mutmut run || true
          python -m mutmut results || true
          echo "mutmut survival rate is informational (pyproject.toml [tool.mutmut]) -- not blocking CI, same first-measurement sequencing mypy went through before it was flipped blocking"
      - name: SBOM freshness (blocking -- sbom.json must match requirements.txt)
        run: |
          pip install cyclonedx-bom
          python tools/generate_sbom.py --check

  # Dependency-vulnerability audit of every service's pinned requirements.txt.
  # This deliberately replaces what Dependabot's PRs used to signal (Dependabot
  # is disabled by owner decision -- no auto-bump PRs): a known CVE in a pinned
  # dependency fails CI loudly instead of silently aging. Fixing it is a manual,
  # reviewed version bump, which is exactly the point.
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.12"
      - name: Audit all pinned service dependencies
        run: |
          pip install pip-audit
          failed=""
          for req in services/*/requirements.txt; do
            echo "=== $req ==="
            pip-audit --requirement "$req" --strict || failed="$failed $req"
          done
          if [ -n "$failed" ]; then
            echo "vulnerable pins in:$failed"
            exit 1
          fi

  # Build every service image. Nothing else in CI proves the Dockerfiles
  # actually build (the zero-infra gate never touches them; PR#2's live runs
  # did, but only on a developer machine). A broken Dockerfile should fail
  # here, not on an operator's first `make up`.
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Build all service images
        run: docker compose -f infra/docker-compose.yml build

  # P3-2/P3-3 (2026-07-21 audit fix plan): declared ATT&CK/ATLAS coverage
  # scorecard, published as a CI artifact every run (SigmaHQ does the
  # equivalent for its rule repo). Zero infra, zero prerequisites -- pure
  # metadata parsed from contracts/rules/*.yml's mitre: blocks. See
  # eval/attack/coverage_layer.py's module docstring for why this is
  # DECLARED coverage only, not proof a technique's mapped rule actually
  # fires (that's the separate, dataset-gated `make eval-detection` lane,
  # deliberately not run in CI -- see eval/detection_accuracy/README.md).
  # M7 (2026-07-22): eval/attack/fire_check.py closes the narrower gap in
  # between -- proves a tagged rule fires on its OWN real producer fixture
  # (zero infra, no dataset needed, so it DOES run here, unlike
  # eval-detection). Still not real-world validation; see that file's
  # module docstring for the declared-vs-fired-vs-real-world distinction.
  attack-scorecard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install pyyaml
      - name: Coverage scorecard tests
        run: python eval/attack/test_coverage_layer.py
      - name: Build scorecard + Navigator layers
        run: python eval/attack/coverage_layer.py
      - name: MITRE empirical firing check (blocking -- a tagged rule that never fires is a real defect)
        run: python eval/attack/fire_check.py
      # NOTE: not SHA-pinned like this file's other actions (checkout/setup-
      # python/gitleaks-action/actionlint) -- this was authored offline with
      # no way to verify a real commit SHA for actions/upload-artifact, and
      # the actionlint job's own docstring exists precisely because a wrong/
      # unresolvable pin here would ship broken and sit undetected. Pin this
      # to a verified SHA before relying on it in a security-sensitive context.
      - name: Upload Navigator layer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: attack-navigator-layers
          path: eval/attack/out/

  # Lint the workflow files themselves (this directory is executable config;
  # the unresolvable `ossf/scorecard-action@v2` tag shipped broken and sat
  # undetected until its first live run -- actionlint-class checks are the
  # gate for that file class).
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: actionlint
        uses: raven-actions/actionlint@3d39aea434753780c3b3d4a1a31c854b4dbf49d7  # v2
