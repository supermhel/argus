name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Secret-scanning gate: fail the build if any credential/secret is committed.
  # Uses the official gitleaks action. Public OSS repo => no GITLEAKS_LICENSE needed.
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so gitleaks can scan all commits, not just the tip.
          fetch-depth: 0
      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          # Lets the action post a summary / comment on pull requests.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Zero-infra gate: contract tests + runner/window/evaluator + both e2e on the memory bus.
  contract-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install pyyaml hypothesis
      - name: Full zero-infra gate
        run: PYTHON=python3 bash run_all_tests.sh

  # Integration gate: the Redis-path mechanisms (runner ack/redelivery/DLQ) against a
  # REAL broker. This is the tier that catches anything the memory bus can't model.
  redis-integration:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install pyyaml redis
      - name: Runner ack + XAUTOCLAIM redelivery + DLQ on real Redis
        env:
          BUS_BACKEND: redis
          REDIS_URL: redis://localhost:6379/0
        run: python services/shared/test_runner.py

  # M2 code-quality floor (PLAN_C Tier 2.3). Lint blocks; coverage blocks at the
  # MEASURED baseline (see tools/coverage_gate.py) not the unmet-for-WS-3 85%
  # target -- see that file's docstring for why. mypy is informational only
  # (non-blocking): see pyproject.toml's [tool.mypy] comment.
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        # hypothesis: the coverage gate runs parsers/test_property_hardening.py
        # (tools/coverage_gate.py line ~33), which imports it -- without it the
        # gate dies on ModuleNotFoundError before measuring anything.
        run: pip install ruff mypy coverage pyyaml types-PyYAML hypothesis
      - name: ruff (blocking)
        run: ruff check services/ tools/
      - name: mypy (informational, non-blocking -- see pyproject.toml)
        run: |
          fail=0
          for ws in services/ws1-collectors services/ws2-normalization services/ws3-indexer \
                    services/ws4-detection services/ws5-ai services/ws6-inventory services/shared tools; do
            mypy "$ws" --explicit-package-bases --ignore-missing-imports || fail=1
          done
          echo "mypy findings are informational (pyproject.toml [tool.mypy]) -- not blocking CI"
          exit 0
      - name: coverage gate (WS-2/WS-3 core, blocking at measured baseline)
        run: python tools/coverage_gate.py
      - name: SBOM freshness (blocking -- sbom.json must match requirements.txt)
        run: |
          pip install cyclonedx-bom
          python tools/generate_sbom.py --check

  # Dependency-vulnerability audit of every service's pinned requirements.txt.
  # This deliberately replaces what Dependabot's PRs used to signal (Dependabot
  # is disabled by owner decision -- no auto-bump PRs): a known CVE in a pinned
  # dependency fails CI loudly instead of silently aging. Fixing it is a manual,
  # reviewed version bump, which is exactly the point.
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Audit all pinned service dependencies
        run: |
          pip install pip-audit
          failed=""
          for req in services/*/requirements.txt; do
            echo "=== $req ==="
            pip-audit --requirement "$req" --strict || failed="$failed $req"
          done
          if [ -n "$failed" ]; then
            echo "vulnerable pins in:$failed"
            exit 1
          fi

  # Build every service image. Nothing else in CI proves the Dockerfiles
  # actually build (the zero-infra gate never touches them; PR#2's live runs
  # did, but only on a developer machine). A broken Dockerfile should fail
  # here, not on an operator's first `make up`.
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build all service images
        run: docker compose -f infra/docker-compose.yml build

  # Lint the workflow files themselves (this directory is executable config;
  # the unresolvable `ossf/scorecard-action@v2` tag shipped broken and sat
  # undetected until its first live run -- actionlint-class checks are the
  # gate for that file class).
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: actionlint
        uses: raven-actions/actionlint@v2
