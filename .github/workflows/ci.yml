name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Zero-infra gate: contract tests + runner/window/evaluator + both e2e on the memory bus.
  contract-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install pyyaml
      - name: Full zero-infra gate
        run: PYTHON=python3 bash run_all_tests.sh

  # Integration gate: the Redis-path mechanisms (runner ack/redelivery/DLQ) against a
  # REAL broker. This is the tier that catches anything the memory bus can't model.
  redis-integration:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install pyyaml redis
      - name: Runner ack + XAUTOCLAIM redelivery + DLQ on real Redis
        env:
          BUS_BACKEND: redis
          REDIS_URL: redis://localhost:6379/0
        run: python services/shared/test_runner.py
