title: Password spray (one account, many distinct source IPs)
id: 4f8a2c61-9e3d-4b57-8a1c-6d2e5f7a8b90
status: stable
description: >
  One account failing authentication from 8+ DISTINCT source IPs within 300
  seconds. The inverse of common_bruteforce.yml (which is per-source-IP): a slow
  spray targeting a single account from many sources evades a per-IP threshold.
  Targets OCSF Authentication (class 3002, activity 4 Failure).
level: high
logsource:
  category: authentication
detection:
  failed_auth:
    class_uid: 3002
    activity_id: 4
  condition: failed_auth
fields:
  - actor.user.name
  - src_endpoint.ip
siem:
  sector: common
  score_weight: 70
  window_seconds: 300
  threshold: 8
  group_by: actor.user.name
  distinct_field: src_endpoint.ip
