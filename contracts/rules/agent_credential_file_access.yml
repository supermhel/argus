title: AI agent tool call accessed credential material
id: 1a2b3c4d-5e6f-4788-9a0b-1c2d3e4f5a6b
status: stable
description: >
  An MCP/agent tool call's arguments reference a path that looks like secret
  material (.env, id_rsa/id_ed25519, .aws/credentials, .ssh/, a secrets/
  credentials file, a .pem/.key file, kube config, .netrc). Detected by the
  mcp_agent parser (services/ws2-normalization/parsers/mcp_agent.py) as a
  simple path-pattern heuristic, exposed as unmapped.mcp.credential_path_access
  -- NOT a classifier, just documented substring/pattern matching. An agent
  legitimately reading its own configured secrets will also fire this; tune
  or suppress per deployment. Single-shot: one such access is itself notable.
level: high
logsource:
  category: application_activity
detection:
  cred_access:
    class_uid: 6003
    unmapped.mcp.credential_path_access: true
  condition: cred_access
fields:
  - actor.user.name
  - api.operation
  - unmapped.mcp.session_id
siem:
  sector: common
  score_weight: 65
