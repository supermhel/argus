# Phase 0 dev infrastructure: message bus + storage + provisioning.
# Service containers (WS-1..WS-7) are added by each workstream skeleton.

services:
  redis:
    image: redis:7-alpine
    container_name: siem-bus
    ports: ["127.0.0.1:6379:6379"]
    # v0.4 Track S3: REDIS_PASSWORD is opt-in. Unset (default) = no auth, same
    # as before. Set it to require AUTH on the bus (:6379 is the spine --
    # anyone reaching it can inject/consume every topic).
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    command: >
      sh -c '
      if [ -n "$$REDIS_PASSWORD" ]; then
        exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD";
      else
        exec redis-server --appendonly yes;
      fi'
    volumes: ["redis-data:/data"]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping 2>/dev/null || redis-cli ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  opensearch:
    image: opensearchproject/opensearch:2.13.0
    container_name: siem-store
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - DISABLE_SECURITY_PLUGIN=true
    ulimits:
      memlock: { soft: -1, hard: -1 }
    # v0.4 Track S4: security plugin stays OFF (TLS/cert overhead disproportionate
    # to this stack's scope); the mitigation is not publishing beyond localhost.
    ports: ["127.0.0.1:9200:9200"]
    volumes: ["os-data:/usr/share/opensearch/data"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  dashboards:
    image: opensearchproject/opensearch-dashboards:2.13.0
    container_name: siem-dashboards
    environment:
      - 'OPENSEARCH_HOSTS=["http://opensearch:9200"]'
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports: ["127.0.0.1:5601:5601"]
    depends_on:
      opensearch: { condition: service_healthy }

  provision:
    image: curlimages/curl:8.7.1
    container_name: siem-provision
    depends_on:
      opensearch: { condition: service_healthy }
    volumes:
      - ../contracts/opensearch-mappings:/mappings:ro
      - ./provision.sh:/provision.sh:ro
    entrypoint: ["sh", "/provision.sh"]
    restart: "no"

  # ---- workstream services (build context = repo root) ----
  ws1-collectors:
    build: { context: .., dockerfile: services/ws1-collectors/Dockerfile }
    restart: unless-stopped
    # Publish the syslog UDP listener so devices (and the smoke test) can send to it.
    ports: ["5514:5514/udp"]
    environment:
      - BUS_BACKEND=redis
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379/0
      # B2 ingest-edge shedding (default 2000/s; explicit here for visibility).
      - SYSLOG_MAX_EVENTS_PER_SEC=2000
      # Zero-loss spool is opt-in; set SYSLOG_SPOOL_PATH (on a permissioned
      # volume, see SECURITY.md §8) + optional SYSLOG_SPOOL_MAX_BYTES to enable.
    depends_on: { redis: { condition: service_healthy } }
    # v0.4: /health now reports 503 when a worker can't reach the bus, so a
    # wedged-but-alive service is detectable/restartable (was a static "ok").
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request as u; u.urlopen('http://127.0.0.1:8001/health', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 20s

  ws2-normalization:
    build: { context: .., dockerfile: services/ws2-normalization/Dockerfile }
    restart: unless-stopped
    environment: ["BUS_BACKEND=redis", "REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379/0"]
    depends_on: { redis: { condition: service_healthy } }
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request as u; u.urlopen('http://127.0.0.1:8002/health', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 20s

  ws3-indexer:
    build: { context: .., dockerfile: services/ws3-indexer/Dockerfile }
    restart: unless-stopped
    environment:
      - BUS_BACKEND=redis
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379/0
      - STORAGE_BACKEND=opensearch
      - OPENSEARCH_URL=http://opensearch:9200
      # Triage API listener. Internal only -- the dashboard nginx proxies to
      # ws3-indexer:8013 container-to-container; NOT published to the host.
      - TRIAGE_PORT=8013
      # v0.4 Track S1: opt-in shared-secret auth (unset = open + warning log).
      - FENGARDE_API_KEY=${FENGARDE_API_KEY:-}
    depends_on:
      redis: { condition: service_healthy }
      opensearch: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request as u; u.urlopen('http://127.0.0.1:8003/health', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 30s

  ws4-detection:
    build: { context: .., dockerfile: services/ws4-detection/Dockerfile }
    restart: unless-stopped
    environment: ["BUS_BACKEND=redis", "REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379/0"]
    depends_on: { redis: { condition: service_healthy } }
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request as u; u.urlopen('http://127.0.0.1:8004/health', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 20s

  ws5-ai:
    build: { context: .., dockerfile: services/ws5-ai/Dockerfile }
    restart: unless-stopped
    environment: ["BUS_BACKEND=redis", "REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379/0"]
    depends_on: { redis: { condition: service_healthy } }
    # set OLLAMA_URL to enable the local LLM; otherwise StubLLM
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request as u; u.urlopen('http://127.0.0.1:8005/health', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 20s

  ws6-inventory:
    build: { context: .., dockerfile: services/ws6-inventory/Dockerfile }
    restart: unless-stopped
    # v0.4: bind to loopback by default. The inventory API has a WRITE surface
    # (POST /assets/upsert) that is open unless FENGARDE_API_KEY is set, so it must
    # not be reachable from the LAN out of the box. Publish on 0.0.0.0 explicitly
    # only after setting a key (see SECURITY.md).
    ports: ["127.0.0.1:8000:8000"]
    volumes: ["inventory-data:/data"]
    environment:
      # v0.4 Track S1: opt-in shared-secret auth (unset = open + warning log).
      - FENGARDE_API_KEY=${FENGARDE_API_KEY:-}

  ws7-dashboard:
    build: { context: .., dockerfile: services/ws7-dashboard/Dockerfile }
    restart: unless-stopped
    # v0.4: bind to loopback by default. The dashboard nginx proxies triage WRITE
    # calls to ws3 (injecting the key server-side), so an open dashboard on the
    # LAN is an open write path. Publish on 0.0.0.0 only behind your own auth/VPN.
    # (Syslog 5514 deliberately stays on all interfaces -- remote devices must
    # reach it to ship logs.)
    ports: ["127.0.0.1:8080:80"]
    depends_on: [ws6-inventory]
    environment:
      # v0.4 Track S1: forwarded to ws3-indexer on the triage proxy so the
      # browser never holds the key. Must match ws3-indexer's FENGARDE_API_KEY.
      - FENGARDE_API_KEY=${FENGARDE_API_KEY:-}
      # v0.4 Track S2: "off" = no dashboard auth (default). See
      # infra/docker-compose.auth.yml for the opt-in override.
      - DASHBOARD_AUTH_REALM=off
    # v0.4 Track S2: dashboard basic-auth is opt-in via a compose OVERRIDE file
    # (infra/docker-compose.auth.yml), not baked in here -- a conditional bind
    # mount of a possibly-missing host file would break the zero-friction
    # `docker compose up` quickstart for everyone who hasn't set it up. See
    # SECURITY.md and infra/docker-compose.auth.yml for the opt-in path.

  # DX2-live: one-shot feeder. Injects an SSH brute-force burst into raw.events
  # so a fresh `docker compose up` yields a REAL alert in the dashboard with no
  # manual step. Exits 0 after producing the burst; idempotent (deterministic ids).
  devkit-feeder:
    build: { context: .., dockerfile: services/devkit-feeder/Dockerfile }
    restart: "no"
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379/0
    depends_on:
      redis: { condition: service_healthy }

  # M7 observability (2026-07-22). Opt-in profile -- `docker compose up`
  # (no --profile flag) is byte-for-byte unaffected, same convention as
  # infra/docker-compose.auth.yml's opt-in dashboard auth override. Bring up
  # with: docker compose -f infra/docker-compose.yml --profile observability up
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: siem-prometheus
    profiles: [observability]
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports: ["127.0.0.1:9090:9090"]
    depends_on: [ws1-collectors, ws2-normalization, ws3-indexer, ws4-detection, ws5-ai]

  grafana:
    image: grafana/grafana:11.1.0
    container_name: siem-grafana
    profiles: [observability]
    environment:
      # Opt-in profile, loopback-only port -- same "no auth surprise" posture
      # as every other opt-in layer in this stack (SECURITY.md). Change this
      # before exposing Grafana beyond localhost.
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports: ["127.0.0.1:3000:3000"]
    depends_on: [prometheus]

volumes:
  redis-data:
  os-data:
  inventory-data:
  prometheus-data:
  grafana-data:
